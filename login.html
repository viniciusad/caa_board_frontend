<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - CAA Board</title>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts: Nunito for friendly, rounded, accessible text -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/dark-theme.css">
</head>

<body>
  <script>
    if (localStorage.getItem('caa_theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }
  </script>
  <header class="app-header">
    <div class="header-content">
      <div class="header-logo" title="Comunicação Aumentativa e Alternativa">
        <h1>
          <a href="index.html"><i class="fa-solid fa-person"></i> CAA Board</a>
        </h1>
      </div>
      <nav id="navMenu">
        <!-- Navigation inserted via JS -->
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="flash-messages" id="flashMessages"></div>

    <div class="auth-container">
      <h2>Entrar</h2>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
        <div class="mt-3" style="margin-top: 10px;">
          <a href="register.html">Não tem uma conta? Registre-se</a>
        </div>
      </form>
    </div>
  </main>

  <script src="./js/common.js"></script>
  <script src="./js/auth.js"></script>
</body>

</html>
